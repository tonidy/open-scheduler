metadata:
  project: "sample-app"
  version: "1.0.0"

services:
  # Simple container service example
  - name: "sample-web-app"
    type: "oci-container"
    replicas: 100
    
    placement:
      constraints:
        - "node.driver == podman"
      strategy: "spread"
    
    spec:
      image: "docker.io/library/nginx:latest"
      command: ["/bin/sh", "-c", "echo 'Hello World'"]
      working_dir: "/tmp"
      
      ports:
        - host: 8080
          container: 80
          protocol: "tcp"
      
      env:
        - name: "ENV"
          value: "production"
        - name: "DEBUG"
          value: "false"
      
      mounts:
        - type: bind
          source: ./data
          target: /app/data
          read_only: false
      
      resources:
        cpu_limit: "0.5"
        mem_limit: "256MB"
      
      security:
        privileged: false
        capabilities:
          add: ["NET_BIND_SERVICE"]
          drop: ["ALL"]
        read_only_root_filesystem: false
      
      health_check:
        test: ["CMD-SHELL", "echo 'healthy' || exit 1"]
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 5s
      
      restart_policy:
        condition: on-failure
        max_attempts: 3
      
      networks: ["backend-net"]